      <rect x="-18" y="63" width="28" height="7" rx="3">
        <animate attributeName="width" values="28;18;38;24;28" dur="3.1s" repeatCount="indefinite"/>
      </rect>
      <rect x="27" y="63" width="31" height="7" rx="3">
        <animate attributeName="width" values="31;22;36;27;31" dur="3.7s" repeatCount="indefinite"/>
      </rect>
    </g>
    <g>
