        <animate attributeName="opacity" values="0.28;0.58;0.28" dur="3.2s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="-26" cy="-20" rx="30" ry="13" fill="#7354d8" opacity="0.38" transform="rotate(24 -26 -20)">
        <animate attributeName="opacity" values="0.35;0.68;0.35" dur="3.7s" repeatCount="indefinite"/>
