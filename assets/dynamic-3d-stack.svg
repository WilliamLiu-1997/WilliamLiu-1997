<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Animated 3D web stack</title>
  <desc id="desc">Animated icons for 3DGS, 3D Tiles, WebGIS, and performance connected by streaming paths.</desc>
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#c7cfdd" stroke-width="1" opacity="0.5"/>
    </pattern>
    <clipPath id="frameClip">
      <rect width="960" height="360" rx="8" ry="8"/>
    </clipPath>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="0.3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="tileTop" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#edf0f6"/>
      <stop offset="1" stop-color="#9cadcf"/>
    </linearGradient>
    <linearGradient id="tileSide" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#718ee8"/>
      <stop offset="1" stop-color="#8f98a8"/>
    </linearGradient>
    <linearGradient id="terrain" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#cfc1a5"/>
      <stop offset="1" stop-color="#aeb8c8"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#frameClip)">
  <rect width="960" height="360" rx="8" ry="8" fill="#e8ebf0"/>
  <rect width="960" height="360" rx="8" ry="8" fill="url(#grid)" opacity="0.42"/>
  <path d="M0 260C115 220 196 232 300 260C426 294 558 305 706 250C820 207 894 220 960 238V360H0Z" fill="#d5dbe5" opacity="0.72"/>
  <path d="M0 284C142 252 263 273 388 291C517 310 648 307 782 260C860 233 916 238 960 252V360H0Z" fill="#eef1f5" opacity="0.58"/>

  <g fill="none" stroke-linecap="round" filter="url(#softGlow)">
    <path d="M154 175C257 86 330 92 396 158C467 228 546 232 626 156C701 86 779 86 842 156" stroke="#405fd0" stroke-width="2.5" stroke-dasharray="7 14" opacity="0.34">
      <animate attributeName="stroke-dashoffset" values="0;-126" dur="6.5s" repeatCount="indefinite"/>
    </path>
    <path d="M156 216C280 286 392 278 486 212C572 151 645 152 724 206C771 238 821 236 872 202" stroke="#6546c8" stroke-width="2" stroke-dasharray="5 13" opacity="0.26">
      <animate attributeName="stroke-dashoffset" values="0;-108" dur="7.8s" repeatCount="indefinite"/>
    </path>
  </g>

  <g transform="translate(125 176)" filter="url(#softGlow)">
    <text x="0" y="-119" fill="#475467" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" text-anchor="middle">3DGS</text>
    <ellipse cx="0" cy="67" rx="92" ry="22" fill="#cbd5e1" opacity="0.25"/>
    <g opacity="0.95">
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -5;0 0" dur="5.2s" repeatCount="indefinite"/>
