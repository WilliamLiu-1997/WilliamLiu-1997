      <animate attributeName="d" values="M-58 51C-44 35 -35 44 -24 30C-12 14 -1 24 10 18C22 11 32 18 42 27C50 34 56 22 58 16;M-58 42C-46 29 -35 35 -24 22C-12 10 -1 18 10 28C22 39 33 28 42 20C50 14 55 21 58 31;M-58 51C-44 35 -35 44 -24 30C-12 14 -1 24 10 18C22 11 32 18 42 27C50 34 56 22 58 16" dur="4.2s" repeatCount="indefinite"/>
    </path>
    <path d="M-58 58H58" stroke="#94a3b8" stroke-width="1.5" opacity="0.42"/>
    <g fill="#a3916f" opacity="0.66">
