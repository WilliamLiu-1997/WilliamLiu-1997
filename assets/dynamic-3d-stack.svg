    <path d="M-52 20C-28 -18 10 -28 42 -4C28 21 4 37 -31 34Z" fill="url(#terrain)" opacity="0.74"/>
    <path d="M-18 -46C10 -60 46 -42 55 -15C36 -24 12 -23 -8 -8Z" fill="#a9b39d" opacity="0.64"/>
    <g>
