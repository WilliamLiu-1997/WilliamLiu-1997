    <rect x="17" y="-27" width="42" height="20" rx="5" fill="#ebe8f7" stroke="#8d7ade" stroke-width="1" opacity="0.95"/>
    <text x="-37" y="-12" fill="#405fd0" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800" text-anchor="middle">FPS</text>
    <text x="38" y="-12" fill="#6546c8" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800" text-anchor="middle">ms</text>
